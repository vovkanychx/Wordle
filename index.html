<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Wordle by Me</title>
</head>
<body>
    <div class="grid">
        <div class="row row_1">
            <input class="cell" type="text" maxlength="1" id="1">
            <input class="cell" type="text" maxlength="1" id="2">
            <input class="cell" type="text" maxlength="1" id="3">
            <input class="cell" type="text" maxlength="1" id="4">
            <input class="cell" type="text" maxlength="1" id="5">
        </div>
        <div class="row row_2">
            <input class="cell" type="text" maxlength="1" id="6">
            <input class="cell" type="text" maxlength="1" id="7">
            <input class="cell" type="text" maxlength="1" id="8">
            <input class="cell" type="text" maxlength="1" id="9">
            <input class="cell" type="text" maxlength="1" id="10">
        </div>
        <div class="row row_3">
            <input class="cell" type="text" maxlength="1" id="11">
            <input class="cell" type="text" maxlength="1" id="12">
            <input class="cell" type="text" maxlength="1" id="13">
            <input class="cell" type="text" maxlength="1" id="14">
            <input class="cell" type="text" maxlength="1" id="15">
        </div>
        <div class="row row_4">
            <input class="cell" type="text" maxlength="1" id="16">
            <input class="cell" type="text" maxlength="1" id="17">
            <input class="cell" type="text" maxlength="1" id="18">
            <input class="cell" type="text" maxlength="1" id="19">
            <input class="cell" type="text" maxlength="1" id="20">
        </div>
        <div class="row row_5">
            <input class="cell" type="text" maxlength="1" id="21">
            <input class="cell" type="text" maxlength="1" id="22">
            <input class="cell" type="text" maxlength="1" id="23">
            <input class="cell" type="text" maxlength="1" id="24">
            <input class="cell" type="text" maxlength="1" id="25">
        </div>
        <div class="row row_6">
            <input class="cell" type="text" maxlength="1" id="26">
            <input class="cell" type="text" maxlength="1" id="27">
            <input class="cell" type="text" maxlength="1" id="28">
            <input class="cell" type="text" maxlength="1" id="29">
            <input class="cell" type="text" maxlength="1" id="30">
        </div>
    </div>
    <div class="keyboard">
        <div class="kb_row">
            <button class="key" data-key="Q" type="button">Q</button>
            <button class="key" data-key="W" type="button">W</button>
            <button class="key" data-key="E" type="button">E</button>
            <button class="key" data-key="R" type="button">R</button>
            <button class="key" data-key="T" type="button">T</button>
            <button class="key" data-key="Y" type="button">Y</button>
            <button class="key" data-key="U" type="button">U</button>
            <button class="key" data-key="I" type="button">I</button>
            <button class="key" data-key="O" type="button">O</button>
            <button class="key" data-key="P" type="button">P</button>
        </div>
        <div class="kb_row">
            <button class="key" data-key="A" type="button">A</button>
            <button class="key" data-key="S" type="button">S</button>
            <button class="key" data-key="D" type="button">D</button>
            <button class="key" data-key="F" type="button">F</button>
            <button class="key" data-key="G" type="button">G</button>
            <button class="key" data-key="H" type="button">H</button>
            <button class="key" data-key="J" type="button">J</button>
            <button class="key" data-key="K" type="button">K</button>
            <button class="key" data-key="L" type="button">L</button>
        </div>
        <div class="kb_row">
            <button class="key" data-key="ENTER" type="button">ENTER</button>
            <button class="key" data-key="Z" type="button">Z</button>
            <button class="key" data-key="X" type="button">X</button>
            <button class="key" data-key="C" type="button">C</button>
            <button class="key" data-key="V" type="button">V</button>
            <button class="key" data-key="B" type="button">B</button>
            <button class="key" data-key="N" type="button">N</button>
            <button class="key" data-key="M" type="button">M</button>
            <button class="key" data-key="BACKSPACE" type="button"></button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
